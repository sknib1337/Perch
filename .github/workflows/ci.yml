name: ci
on:
  push: { branches: [main] }
  pull_request: {}
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ matrix.python-version }}" }
      - run: pip install pyyaml cryptography
      - name: offline suite (cryptography backend -- Ed25519 / Fernet)
        run: python tests/test_reconcile.py
      - name: offline suite (stdlib backend)
        run: python tests/test_reconcile.py
        env: { PERCH_CRYPTO_BACKEND: stdlib }

  integration:
    runs-on: ubuntu-latest          # GitHub-hosted runners include Docker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pyyaml
      - name: C9 gateway e2e (real sockets + subprocess; no Docker)
        run: python tests/e2e_gateway.py
      - name: C9 gateway Docker launch check (real container)
        run: python tests/docker_gateway_check.py
      - name: composed apply() e2e (identity + egress + mcp via one apply)
        run: python tests/compose_e2e.py

  windows:
    runs-on: windows-latest         # perch share targets work Windows PCs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pyyaml
      - name: offline suite on Windows (stdlib backend)
        run: python tests/test_reconcile.py
        env: { PERCH_CRYPTO_BACKEND: stdlib }
      - name: share plumbing check (real firewall rule + probe; runner is admin)
        run: python tests/windows_share_check.py
