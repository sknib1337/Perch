<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Perch — Command Center</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<script>
tailwind.config = { darkMode: "class", theme: { extend: {
  colors: {
    background:"#060913", surface:"#060913", "surface-container-low":"#0a0e1c",
    "surface-container":"#0e1326", "surface-container-high":"#131a33",
    "surface-container-highest":"#1a2240", "on-background":"#dae2fd",
    "on-surface":"#dae2fd", "on-surface-variant":"#bdc8d1", primary:"#8ed5ff",
    "primary-dim":"#7bd0ff", "on-primary":"#00354a", secondary:"#4de082",
    tertiary:"#ffc42f", error:"#ffb4ab", "error-container":"#93000a",
    outline:"#87929a", "outline-variant":"#3e484f" },
  borderRadius:{ DEFAULT:"0.125rem", lg:"0.25rem", xl:"0.5rem", full:"0.75rem" },
  fontFamily:{ body:["Inter"], mono:["JetBrains Mono"] }
}}};
</script>
<style>
  body{font-family:Inter}
  .mono{font-family:'JetBrains Mono'}
  .glass{background:rgba(255,255,255,.03);backdrop-filter:blur(8px)}
  .panel{background:rgba(19,26,51,.6);backdrop-filter:blur(10px);border:1px solid rgba(62,72,79,.35)}
  .ring-healthy{border-color:rgba(77,224,130,.5);box-shadow:0 0 18px 2px rgba(77,224,130,.18),inset 0 0 10px rgba(77,224,130,.1)}
  .ring-warn{border-color:rgba(255,196,47,.6);box-shadow:0 0 18px 2px rgba(255,196,47,.2);animation:pw 2s infinite}
  .ring-error{border-color:rgba(255,99,99,.8);box-shadow:0 0 18px 2px rgba(255,99,99,.3)}
  .ring-idle{border-color:rgba(135,146,154,.4)}
  @keyframes pw{0%,100%{box-shadow:0 0 18px 2px rgba(255,196,47,.2)}50%{box-shadow:0 0 28px 4px rgba(255,196,47,.4)}}
  .navlink.active{background:rgba(77,224,130,.1);color:#4de082;border-left:2px solid #4de082;font-weight:700}
  ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#1a2240;border-radius:4px}
</style>
</head>
<body class="bg-background text-on-background antialiased h-screen w-full overflow-hidden flex">

<!-- Sidebar -->
<nav class="fixed left-0 top-0 h-screen w-16 hover:w-60 flex flex-col py-5 z-50 bg-surface-container-low/95 backdrop-blur-xl border-r border-outline-variant/20 transition-all duration-300 group overflow-hidden">
  <div class="px-4 mb-8 flex items-center gap-3 min-w-[240px]">
    <div class="min-w-8 w-8 h-8 rounded bg-primary/10 flex items-center justify-center text-primary">
      <span class="material-symbols-outlined text-xl" style="font-variation-settings:'FILL' 1">park</span>
    </div>
    <div class="opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">
      <h1 class="mono text-[11px] font-bold uppercase tracking-widest text-primary">Perch</h1>
      <p class="mono text-[11px] text-on-surface-variant" id="proj-label">command center</p>
    </div>
  </div>
  <div class="flex-1 px-2 space-y-1 min-w-[240px] mono text-[13px]" id="nav"></div>
  <div class="px-4 mt-auto min-w-[240px] pt-4 border-t border-outline-variant/20">
    <button onclick="runDoctor()" class="flex items-center gap-4 text-on-surface-variant hover:text-primary">
      <span class="material-symbols-outlined min-w-6 text-center">medical_services</span>
      <span class="opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap text-[13px]">Doctor</span>
    </button>
  </div>
</nav>

<!-- Main -->
<main class="flex-1 ml-16 flex flex-col h-screen">
  <header class="flex justify-between items-center w-full px-4 h-16 sticky top-0 z-40 bg-surface/80 backdrop-blur-md border-b border-outline-variant/30">
    <span class="text-2xl font-semibold text-primary tracking-tight">Perch</span>
    <div class="flex items-center gap-4 mono text-[11px]">
      <span id="pulse-services" class="px-3 py-1.5 rounded-full bg-surface-container-high border border-outline-variant/20">— services</span>
      <span id="pulse-drift" class="px-3 py-1.5 rounded-full bg-surface-container-high border border-outline-variant/20">— drift</span>
    </div>
  </header>
  <div id="view" class="flex-1 overflow-y-auto p-6"></div>
</main>

<!-- Toast -->
<div id="toast" class="fixed bottom-6 right-6 z-[60] hidden panel rounded-lg px-4 py-3 mono text-[13px]"></div>

<script>
const API = "";  // same origin
const ROUTES = [
  ["topology","Topology","hub"], ["services","Services","layers"],
  ["deploy","Deploy","rocket_launch"], ["drift","Drift / Audit","security_update_warning"],
  ["backups","Backups","settings_backup_restore"], ["manifest","Manifest","description"],
];
const TYPE_ICON = {webapp:"public", agent:"smart_toy", postgres:"database",
  cache:"bolt", storage:"folder", "rest-api":"api", function:"function", auth:"lock"};

const $ = s => document.querySelector(s);
const el = (t, c, h) => { const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e; };
async function get(p){ const r=await fetch(API+p); return r.json(); }
async function post(p,b){ const r=await fetch(API+p,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(b||{})}); return r.json(); }
function toast(msg, ok=true){ const t=$("#toast"); t.innerHTML=`<span class="${ok?'text-secondary':'text-error'}">${msg}</span>`; t.classList.remove("hidden"); setTimeout(()=>t.classList.add("hidden"),3500); }

// status -> health ring + badge color
function ring(n){ if(n.status!=="running") return "ring-error"; if(n.health==="unhealthy") return "ring-error"; if(n.health==="starting") return "ring-warn"; if(n.health==="healthy") return "ring-healthy"; return "ring-idle"; }
function statusBadge(s,h){
  let c="text-on-surface-variant bg-surface-container-high", t=s;
  if(s==="running"&&h!=="unhealthy"){c="text-secondary bg-secondary/10";t=h==="none"?"running":h;}
  else if(h==="unhealthy"){c="text-error bg-error/10";t="unhealthy";}
  else if(s==="exited"){c="text-error bg-error/10";}
  else if(s==="missing"){c="text-tertiary bg-tertiary/10";}
  return `<span class="mono text-[11px] px-2 py-0.5 rounded ${c}">${t}</span>`;
}
const DRIFT_C={MISSING:"tertiary",STALE:"tertiary",DRIFT:"tertiary",DOWN:"error",UNHEALTHY:"error",UNMANAGED:"error",ERROR:"error"};
const KIND_C={create:"secondary",rebuild:"primary",reconfigure:"tertiary",restart:"primary",prune:"error",noop:"outline",error:"error"};
const KIND_SY={create:"+",rebuild:"↑",reconfigure:"~",restart:"∗",prune:"−",noop:"=",error:"!"};

function renderNav(){
  const cur=(location.hash||"#topology").slice(1).split("/")[0];
  $("#nav").innerHTML="";
  ROUTES.forEach(([id,label,icon])=>{
    const a=el("a",`navlink flex items-center gap-4 px-2 py-2.5 rounded-lg hover:bg-surface-container-high transition ${id===cur?"active":"text-on-surface-variant"}`);
    a.href="#"+id; a.innerHTML=`<span class="material-symbols-outlined min-w-6 text-center">${icon}</span><span class="opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">${label}</span>`;
    $("#nav").appendChild(a);
  });
}

async function refreshPulse(){
  try{
    const [svcs,drift]=await Promise.all([get("/api/services"),get("/api/drift")]);
    const up=svcs.filter(s=>s.status==="running").length;
    $("#pulse-services").innerHTML=`<span class="text-secondary">●</span> ${up}/${svcs.length} up`;
    const d=drift.length;
    $("#pulse-drift").innerHTML= d? `<span class="text-tertiary">⚠</span> drift: ${d}` : `<span class="text-secondary">✓</span> in sync`;
    $("#pulse-drift").className=`px-3 py-1.5 rounded-full border ${d?'bg-tertiary/10 border-tertiary/30 text-tertiary':'bg-surface-container-high border-outline-variant/20'}`;
  }catch(e){}
}

// ---------- screens ----------
async function viewTopology(root){
  const t=await get("/api/topology");
  const managed=t.nodes.filter(n=>n.managed), work=t.nodes.filter(n=>!n.managed);
  const W=Math.max(work.length,managed.length,1), colW=180, padX=60, padY=70;
  const width=padX*2+(W-1)*colW+120, H=420;
  const pos={}; const place=(arr,y)=>arr.forEach((n,i)=>pos[n.id]={x:padX+i*colW+60,y});
  place(work,padY); place(managed,H-padY-90);
  const node=n=>{const p=pos[n.id];return `<a href="#services/${n.id}" class="absolute -translate-x-1/2 -translate-y-1/2 flex flex-col items-center gap-2 group/n" style="left:${p.x}px;top:${p.y}px">
    <div class="glass w-20 h-20 rounded-full border-2 ${ring(n)} flex items-center justify-center text-primary group-hover/n:scale-105 transition">
      <span class="material-symbols-outlined text-3xl">${TYPE_ICON[n.type]||"deployed_code"}</span></div>
    <div class="text-center"><div class="mono text-[12px] text-on-surface">${n.name}</div>
      <div class="mono text-[10px] text-on-surface-variant uppercase tracking-wide">${n.type}</div></div></a>`;};
  const lines=t.edges.map(e=>{const a=pos[e.from],b=pos[e.to];if(!a||!b)return"";
    return `<line x1="${a.x}" y1="${a.y+40}" x2="${b.x}" y2="${b.y-40}" stroke="#7bd0ff" stroke-opacity="0.35" stroke-width="1.5" stroke-dasharray="6 6"/>`;}).join("");
  root.innerHTML=`
    <div class="flex items-center justify-between mb-4">
      <div><h2 class="text-2xl font-semibold">Topology</h2>
        <p class="text-on-surface-variant text-sm">Workloads perched on managed services. Edges are bindings.</p></div>
      <a href="#deploy" class="mono text-[13px] px-4 py-2 rounded-lg bg-primary text-on-primary font-bold">Deploy ▸</a>
    </div>
    <div class="panel rounded-xl p-2 overflow-auto">
      <div class="relative mx-auto" style="width:${width}px;height:${H}px;min-width:100%">
        <svg class="absolute inset-0 w-full h-full" style="width:${width}px;height:${H}px">${lines}</svg>
        ${t.nodes.map(node).join("")}
        ${t.nodes.length?"":'<div class="absolute inset-0 flex items-center justify-center text-on-surface-variant mono text-sm">No services declared.</div>'}
      </div>
    </div>`;
}

async function viewServices(root){
  const svcs=await get("/api/services");
  const row=s=>`<tr class="border-b border-outline-variant/15 hover:bg-surface-container-high/40 cursor-pointer" onclick="location.hash='#services/${s.name}'">
    <td class="py-3 pl-4"><div class="flex items-center gap-3"><span class="material-symbols-outlined text-primary text-lg">${TYPE_ICON[s.type]||"deployed_code"}</span>
      <span class="mono text-[13px]">${s.name}</span></div></td>
    <td><span class="mono text-[11px] px-2 py-0.5 rounded ${s.managed?'bg-primary/10 text-primary':'bg-surface-container-high text-on-surface-variant'}">${s.type}</span></td>
    <td>${statusBadge(s.status,s.health)}</td>
    <td class="mono text-[11px] text-on-surface-variant">${s.route&&s.route.host?s.route.host:(s.bindings.length?"→ "+s.bindings.join(", "):"—")}</td></tr>`;
  root.innerHTML=`<h2 class="text-2xl font-semibold mb-4">Services <span class="mono text-sm text-on-surface-variant">(${svcs.length})</span></h2>
    <div class="panel rounded-xl overflow-hidden"><table class="w-full text-left">
      <thead class="mono text-[11px] uppercase tracking-wider text-on-surface-variant border-b border-outline-variant/30">
        <tr><th class="py-2 pl-4">Service</th><th>Type</th><th>Status</th><th>Route / Binds</th></tr></thead>
      <tbody>${svcs.map(row).join("")||'<tr><td class="p-4 text-on-surface-variant mono text-sm">No services.</td></tr>'}</tbody>
    </table></div>`;
}

async function viewServiceDetail(root,name){
  const s=await get("/api/services/"+name);
  if(!s||s.error){root.innerHTML=`<p class="text-error mono">Service not found.</p>`;return;}
  const env=s.env.map(e=>`<div class="flex justify-between py-1 border-b border-outline-variant/10"><span class="mono text-[12px] text-on-surface-variant">${e.key}</span><span class="mono text-[12px] ${e.secret?'text-tertiary':''}">${e.value}</span></div>`).join("")||'<span class="text-on-surface-variant mono text-[12px]">none</span>';
  const exports=s.exports?Object.entries(s.exports).map(([k,v])=>`<div class="flex justify-between py-1 border-b border-outline-variant/10"><span class="mono text-[12px] text-on-surface-variant">${k}</span><span class="mono text-[12px] text-tertiary">${v}</span></div>`).join(""):"";
  root.innerHTML=`
   <div class="flex items-center gap-3 mb-1"><a href="#services" class="text-on-surface-variant hover:text-primary material-symbols-outlined">arrow_back</a>
     <span class="material-symbols-outlined text-primary text-2xl">${TYPE_ICON[s.type]||"deployed_code"}</span>
     <h2 class="text-2xl font-semibold">${s.name}</h2>${statusBadge(s.status,s.health)}
     <span class="mono text-[11px] px-2 py-0.5 rounded bg-surface-container-high text-on-surface-variant">${s.type}</span></div>
   <div class="flex gap-2 mb-5 mt-3">
     <button onclick="act('/api/services/${s.name}/restart','Restarted ${s.name}')" class="mono text-[12px] px-3 py-1.5 rounded-lg border border-outline-variant/40 hover:bg-surface-container-high">Restart</button>
     ${s.type==="postgres"?`<button onclick="act('/api/services/${s.name}/backup','Backup started')" class="mono text-[12px] px-3 py-1.5 rounded-lg border border-outline-variant/40 hover:bg-surface-container-high">Back up now</button>`:""}
     <button onclick="loadLogs('${s.name}')" class="mono text-[12px] px-3 py-1.5 rounded-lg border border-outline-variant/40 hover:bg-surface-container-high">Refresh logs</button>
   </div>
   <div class="grid md:grid-cols-2 gap-4">
     <div class="panel rounded-xl p-5"><h3 class="mono text-[11px] uppercase tracking-wider text-primary mb-3">Overview</h3>
       <div class="space-y-1 mono text-[12px]">
         <div class="flex justify-between"><span class="text-on-surface-variant">image</span><span>${s.image_ref||s.build||s.image||"—"}</span></div>
         <div class="flex justify-between"><span class="text-on-surface-variant">port</span><span>${s.port||(s.managed?"internal":"—")}</span></div>
         <div class="flex justify-between"><span class="text-on-surface-variant">restart</span><span>${s.restart}</span></div>
         <div class="flex justify-between"><span class="text-on-surface-variant">schedule</span><span>${s.schedule||"—"}</span></div>
         <div class="flex justify-between"><span class="text-on-surface-variant">source_hash</span><span>${(s.source_hash||"—").slice(0,12)}</span></div>
         <div class="flex justify-between"><span class="text-on-surface-variant">bound by</span><span>${(s.bound_by||[]).join(", ")||"—"}</span></div>
       </div></div>
     <div class="panel rounded-xl p-5"><h3 class="mono text-[11px] uppercase tracking-wider text-primary mb-3">Environment</h3>${env}
       ${exports?`<h3 class="mono text-[11px] uppercase tracking-wider text-primary mt-4 mb-3">Exports (bindings)</h3>${exports}`:""}</div>
   </div>
   <div class="panel rounded-xl p-5 mt-4"><h3 class="mono text-[11px] uppercase tracking-wider text-primary mb-3">Logs</h3>
     <pre id="logs" class="mono text-[12px] bg-surface-container-low rounded-lg p-3 overflow-auto max-h-72 text-on-surface-variant">loading…</pre></div>`;
  loadLogs(name);
}
async function loadLogs(name){ const d=await get(`/api/services/${name}/logs`); const p=$("#logs"); if(p) p.textContent=(d.lines&&d.lines.length)?d.lines.join("\n"):(d.error||"(no logs)"); }

async function viewDeploy(root){
  const plan=await get("/api/plan");
  const changes=plan.filter(a=>a.kind!=="noop");
  const row=a=>`<div class="flex items-center gap-3 py-2 border-b border-outline-variant/10">
    <span class="mono w-6 text-center text-${KIND_C[a.kind]||'outline'} font-bold">${KIND_SY[a.kind]||"·"}</span>
    <span class="mono text-[12px] text-${KIND_C[a.kind]||'outline'} w-28">${a.kind}</span>
    <span class="mono text-[13px]">${a.target}</span>
    <span class="mono text-[11px] text-on-surface-variant ml-auto">${a.detail}</span></div>`;
  root.innerHTML=`<div class="flex items-center justify-between mb-4">
      <div><h2 class="text-2xl font-semibold">Deploy</h2><p class="text-on-surface-variant text-sm">Reconcile the host to the manifest. Review the plan, then apply.</p></div>
      <div class="flex gap-2">
        <button onclick="viewDeploy($('#view'))" class="mono text-[12px] px-3 py-2 rounded-lg border border-outline-variant/40">Re-plan</button>
        <button onclick="doApply(false)" class="mono text-[13px] px-4 py-2 rounded-lg bg-primary text-on-primary font-bold ${changes.length?'':'opacity-40 pointer-events-none'}">Apply ${changes.length} change${changes.length===1?'':'s'}</button>
      </div></div>
    <div class="panel rounded-xl p-5">
      <h3 class="mono text-[11px] uppercase tracking-wider text-primary mb-3">Plan</h3>
      ${plan.map(row).join("")}
      ${changes.length?"":'<p class="mono text-[12px] text-secondary mt-3">✓ Everything is up to date.</p>'}
    </div>
    <div id="apply-out" class="panel rounded-xl p-5 mt-4 hidden"><h3 class="mono text-[11px] uppercase tracking-wider text-primary mb-3">Apply output</h3><pre id="apply-log" class="mono text-[12px] text-on-surface-variant"></pre></div>`;
}
async function doApply(rebuild){
  const out=$("#apply-out"), log=$("#apply-log"); out.classList.remove("hidden"); log.textContent="applying…";
  const r=await post("/api/apply",{rebuild});
  log.textContent=(r.applied||[]).map(a=>`${a.kind} ${a.target}`).join("\n")+(r.ok?"\n\n✓ done":`\n\n✗ ${r.error||""}`);
  toast(r.ok?"Apply complete":"Apply failed", r.ok); refreshPulse();
}

async function viewDrift(root){
  const d=await get("/api/drift");
  const row=f=>`<div class="flex items-center gap-3 py-2 border-b border-outline-variant/10">
    <span class="mono text-[11px] px-2 py-0.5 rounded bg-${DRIFT_C[f.code]||'outline'}/10 text-${DRIFT_C[f.code]||'outline'} w-28 text-center">${f.code}</span>
    <span class="mono text-[13px] w-32">${f.service}</span>
    <span class="text-[13px] text-on-surface-variant">${f.message}</span></div>`;
  root.innerHTML=`<h2 class="text-2xl font-semibold mb-1">Drift / Audit</h2>
    <p class="text-on-surface-variant text-sm mb-4">Divergence between the manifest and what's running.</p>
    <div class="panel rounded-xl p-5">
      ${d.length? d.map(row).join("") :
        '<div class="flex items-center gap-2 text-secondary mono text-sm py-4"><span class="material-symbols-outlined">check_circle</span> In sync — the running state matches the manifest.</div>'}
    </div>`;
}

async function viewBackups(root){
  const b=await get("/api/backups");
  const fmt=t=>new Date(t*1000).toISOString().replace("T"," ").slice(0,19)+"Z";
  const row=x=>`<tr class="border-b border-outline-variant/15"><td class="py-2 pl-4 mono text-[13px]">${x.service}</td>
    <td class="mono text-[12px]">${x.file}</td><td class="mono text-[11px] text-on-surface-variant">${(x.size/1024).toFixed(1)} KB</td>
    <td class="mono text-[11px] text-on-surface-variant">${fmt(x.created_at)}</td></tr>`;
  root.innerHTML=`<h2 class="text-2xl font-semibold mb-4">Backups</h2>
    <div class="panel rounded-xl overflow-hidden"><table class="w-full text-left">
      <thead class="mono text-[11px] uppercase tracking-wider text-on-surface-variant border-b border-outline-variant/30">
        <tr><th class="py-2 pl-4">Service</th><th>File</th><th>Size</th><th>Created</th></tr></thead>
      <tbody>${b.map(row).join("")||'<tr><td class="p-4 mono text-sm text-on-surface-variant">No backups yet. Run a backup from a Postgres service detail, or `perch backup`.</td></tr>'}</tbody>
    </table></div>`;
}

async function viewManifest(root){
  const p=await get("/api/project"); const svcs=await get("/api/services");
  root.innerHTML=`<h2 class="text-2xl font-semibold mb-4">Manifest</h2>
    <div class="panel rounded-xl p-5 mono text-[13px] space-y-1">
      <div><span class="text-on-surface-variant">project:</span> ${p.project}</div>
      <div><span class="text-on-surface-variant">prune:</span> ${p.prune}</div>
      <div><span class="text-on-surface-variant">managed:</span> ${p.managed.join(", ")||"—"}</div>
      <div><span class="text-on-surface-variant">workloads:</span> ${p.workloads.join(", ")||"—"}</div>
    </div>
    <p class="text-on-surface-variant text-sm mt-4">Edit <span class="mono">perch.yaml</span> on the host and re-deploy. (Manifest editing from the console is on the roadmap.)</p>`;
}

async function runDoctor(){
  const checks=await get("/api/doctor");
  const ok=checks.every(c=>c.ok);
  const lines=checks.map(c=>`<div class="flex items-center gap-2 py-1"><span class="material-symbols-outlined text-[18px] ${c.ok?'text-secondary':'text-error'}">${c.ok?'check_circle':'cancel'}</span><span class="mono text-[12px]">${c.check}</span>${c.ok?"":`<span class="mono text-[11px] text-on-surface-variant ml-2">${c.fix}</span>`}</div>`).join("");
  const t=$("#toast"); t.innerHTML=`<div class="mb-1 font-bold ${ok?'text-secondary':'text-tertiary'}">${ok?'All systems go':'Action needed'}</div>${lines}`;
  t.classList.remove("hidden"); setTimeout(()=>t.classList.add("hidden"),7000);
}
async function act(path,msg){ const r=await post(path); toast(r.ok?msg:(r.error||"Failed"), r.ok); refreshPulse(); }

// ---------- router ----------
async function route(){
  renderNav();
  const parts=(location.hash||"#topology").slice(1).split("/");
  const v=$("#view"); v.innerHTML='<div class="mono text-on-surface-variant text-sm">loading…</div>';
  try{
    if(parts[0]==="topology") await viewTopology(v);
    else if(parts[0]==="services"&&parts[1]) await viewServiceDetail(v,parts[1]);
    else if(parts[0]==="services") await viewServices(v);
    else if(parts[0]==="deploy") await viewDeploy(v);
    else if(parts[0]==="drift") await viewDrift(v);
    else if(parts[0]==="backups") await viewBackups(v);
    else if(parts[0]==="manifest") await viewManifest(v);
    else await viewTopology(v);
  }catch(e){ v.innerHTML=`<div class="panel rounded-xl p-5 text-error mono text-sm">Failed to load. Is the API running and the manifest valid?<br>${e}</div>`; }
}
window.addEventListener("hashchange",route);
(async()=>{ try{const p=await get("/api/project"); $("#proj-label").textContent=p.project;}catch(e){} route(); refreshPulse(); setInterval(refreshPulse,8000); })();
</script>
